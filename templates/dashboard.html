<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PIXEL ON WIRES // FPV DASHBOARD</title>
    <style>
        :root {
            /* Removed the incorrect "var()" wrapping */
            --accent: #ffb86c; 
            --bg: #0b0b0d;
            --panel: #141419;
            --text-muted: #6272a4;
        }
        body { 
            background: var(--bg); 
            color: #f8f8f2; 
            font-family: "Courier New", Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0; 
            padding: 40px 20px; 
        }

        h2 {
            letter-spacing: 4px;
            color: #50fa7b;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(80, 250, 123, 0.3);
        }

        .dashboard { 
            background: var(--panel); 
            border: 1px solid #282a36; 
            border-radius: 6px; 
            padding: 24px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .video-wrapper {
            width: 800px;
            height: 450px; 
            background: #000;
            border-radius: 4px;
            border: 1px solid #444;
            overflow: hidden; 
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pov { 
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: rotate(90deg) scale(1.8); 
        }

        .hud-overlay {
            position: absolute;
            top: 15px;
            left: 20px;
            color: #ffb86c;
            font-size: 12px;
            pointer-events: none;
            text-shadow: 1px 1px 0px #000;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .controls-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px dashed #333;
            padding-top: 20px;
            font-size: 0.9rem;
        }

        .status-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: var(--text-muted);
        }

        #cmd-log { 
            color: #ffb86c; 
            font-weight: bold; 
            letter-spacing: 1px;
        }
        
        #pad-status { font-weight: bold; transition: color 0.3s ease; }

        input { 
            background: #000; 
            color: #50fa7b; 
            border: 1px solid #444; 
            padding: 8px 12px; 
            font-family: inherit;
            border-radius: 4px;
            outline: none;
            width: 140px;
            text-align: center;
        }
        
        input:focus { border-color: #ffb86c; }
    </style>
</head>
<body>

    <h2>[ PIXEL ON WIRES // FPV FEED ]</h2>
    
    <div class="dashboard">
        <div class="video-wrapper">
            <div class="hud-overlay">
                <span>REC ●</span>
                <span id="pad-status">PAD // OFFLINE</span>
                <span>PWR // <span id="hud-speed">0</span></span>
            </div>
            <img id="pov" src="" alt="AWAITING STREAM DATA...">
        </div>
        
        <div class="controls-panel">
            <div class="status-box">
                <span>TARGET IP: <input type="text" id="esp_ip" value="10.218.186.69" readonly style="cursor: not-allowed; color: #6272a4; border-color: #333;"></span>
            </div>
            <div class="status-box" style="text-align: right;">
                <span>INPUT // ACTIVE</span>
                <span id="cmd-log">SYS.IDLE</span>
            </div>
        </div>
    </div>

    <script>
        const povImage = document.getElementById('pov');
        const ws = new WebSocket(`ws://${window.location.host}/dash-ws`);
        ws.onmessage = (event) => { povImage.src = event.data; };

        // --- Core State Variables ---
        const MAX_SPEED = 160;   // Hard cap - motors can't usefully exceed this under load
        const RAMP_RATE = 2;     // Throttle change per frame (~120 units/sec at 60fps)
        const DEADZONE = 0.15;

        let throttle = 0;        // Signed target speed: + forward, - reverse
        let lastSentLeft = null;
        let lastSentRight = null;

        let gamepadIndex = null;

        const cmdLog = document.getElementById('cmd-log');
        const padStatus = document.getElementById('pad-status');
        const hudSpeed = document.getElementById('hud-speed');

        function sendMotors(leftMotor, rightMotor) {
            if (leftMotor === lastSentLeft && rightMotor === lastSentRight) return;
            lastSentLeft = leftMotor;
            lastSentRight = rightMotor;

            cmdLog.innerText = `L: ${leftMotor} | R: ${rightMotor}`;

            const espIp = document.getElementById('esp_ip').value;
            fetch(`/drive?left=${leftMotor}&right=${rightMotor}&esp_ip=${espIp}`);
        }

        // --- Gamepad Controls ---
        window.addEventListener("gamepadconnected", (e) => {
            gamepadIndex = e.gamepad.index;
            padStatus.innerText = "PAD // LINKED";
            padStatus.style.color = "#50fa7b";
            requestAnimationFrame(pollGamepad);
        });

        window.addEventListener("gamepaddisconnected", (e) => {
            if (e.gamepad.index === gamepadIndex) {
                gamepadIndex = null;
                padStatus.innerText = "PAD // OFFLINE";
                padStatus.style.color = "#ffb86c";
                throttle = 0;
                sendMotors(0, 0);
            }
        });

        function pollGamepad() {
            if (gamepadIndex !== null) {
                const pad = navigator.getGamepads()[gamepadIndex];
                if (pad) {
                    // 1. RB = brake: stop immediately, overrides RT/LT this frame
                    if (pad.buttons[5].pressed) {
                        throttle = 0;
                    } else {
                        // RT ramps speed up (toward forward), LT ramps it down
                        // and past 0 continues ramping into reverse.
                        if (pad.buttons[7].pressed) {
                            throttle = Math.min(MAX_SPEED, throttle + RAMP_RATE);
                        }
                        if (pad.buttons[6].pressed) {
                            throttle = Math.max(-MAX_SPEED, throttle - RAMP_RATE);
                        }
                    }

                    let leftMotor = throttle;
                    let rightMotor = throttle;

                    const spin = Math.abs(pad.axes[2]) > DEADZONE ? pad.axes[2] : 0;

                    if (spin !== 0 && throttle === 0) {
                        // Right stick: spin on the spot (only while stopped)
                        leftMotor = spin * MAX_SPEED;
                        rightMotor = -spin * MAX_SPEED;
                    } else {
                        // Left stick: steer by easing the inner wheel toward 0,
                        // never reversing it - full spin is the right stick's job.
                        const steer = Math.abs(pad.axes[0]) > DEADZONE ? pad.axes[0] : 0;
                        if (steer > 0) rightMotor = throttle * (1 - steer);
                        else if (steer < 0) leftMotor = throttle * (1 + steer);
                    }

                    leftMotor = Math.round(leftMotor);
                    rightMotor = Math.round(rightMotor);

                    hudSpeed.innerText = Math.round(throttle);
                    sendMotors(leftMotor, rightMotor);
                }
                requestAnimationFrame(pollGamepad);
            }
        }
    </script>
</body>
</html>
